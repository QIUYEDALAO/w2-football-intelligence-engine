  - treating shadow_pick as a recommendation
  - production deployment without explicit approval
  - staging deployment without explicit approval
  - enabling a new league without explicit approval
  - provider calls without an explicit approved scope and hard cap
  - database writes without explicit approval
  - scheduler restart or restart-policy change without explicit approval
  - lock capture or settlement writes without explicit approval
  - committing runtime artifacts, reports, dist output, logs, cache, .env, keys, headers, raw provider payloads, or .learnings
  - adding Stage 16

