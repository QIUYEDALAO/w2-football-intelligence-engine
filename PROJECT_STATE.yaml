active_decisions:
  - id: MARKET-PROBABILITY-SOURCE
    decision: Display probabilities use de-vig market probabilities; model output is a divergence signal and explanation.
    status: active
  - id: LOCK-ELIGIBLE-B
    decision: lock_eligible if and only if decision_tier is RECOMMEND.
    status: active
  - id: DIRECTION-ALLOWED-GATE
    decision: direction_allowed remains false until a separate per-league approved release PR.
    status: active
    prereg_conditions:
      - Each league and market has at least 100 distinct-fixture valid same-line shadow CLV samples.
      - Median same-line decimal shadow CLV is greater than 0.
      - Latest matching-market gap is at most 0.04.
      - Entry-window coverage is at least 80 percent.
      - Valid prematch closing-pair coverage is at least 80 percent.
      - Settled-outcome coverage is at least 90 percent.
      - Provider daily usage remains at or below 120.
  - id: RECOMMEND-GATE
    decision: EV and RECOMMEND remain default off.
    status: active
    prereg_conditions:
      - At least 200 real forward picks per league.
      - Median real-pick CLV is greater than 0.
      - Rolling blend weight remains below 1 and stably outperforms pure market.
  - id: SHADOW-EVIDENCE-BOUNDARY
    decision: shadow_pick is not a recommendation, is not displayed, and never merges with real-pick CLV.
    status: active
  - id: DEPLOYMENT-BOUNDARY
    decision: Staging and production deployments always require explicit, separate approval.
    status: active

allowed_next_work:
  - Continue the daily read-only evidence patrol; report validation total, settled, pending, outcomes, and L2 audit counts separately.
  - Run an independent R1.1 evidence review only after the pre-registered threshold is actually reached; do not lower its threshold.
  - Prepare a separate per-league and per-market direction_allowed review only after all prereg evidence passes.
  - Review the shadow EV challenger only at its 35/100 settled-sample milestones; it remains non-decisioning.
  - Request separate approval before any provider probe, scheduler reconfiguration, staging deployment, league enablement, or account cost.
  - Keep formal RECOMMEND closed until the registered real-pick evidence gate passes.

prohibited:
  - automatic direction_allowed release
