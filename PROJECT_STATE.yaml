open_work:
  - id: THIRTEEN-LEAGUE-READINESS
    priority: critical
    status: PHASE_1_WORLD_CUP_RUNTIME_ARCHIVE_IN_PROGRESS
    branch: codex/w2-world-cup-runtime-archive
    objective: Make all 13 active leagues technically recommendation-ready without opening RECOMMEND, lock, or production.
    active_whitelist_target: 13
    archived_competitions:
      - world_cup_2026
    implementation_order:
      - Archive World Cup from live registry, scheduler, refresh policy, audit scope, and DayView.
      - Add per-league and per-market readiness truth matrix.
      - Unify LeagueFeatureSnapshot across eval, artifact publishing, and serving.
      - Wire CSL, Allsvenskan, and Eliteserien serving models.
      - Publish top-five champions and repair Bundesliga gap.
      - Complete Brazil, Argentina, MLS, Eredivisie, and Primeira Liga models.
      - Add approved secondary provider port and controlled capability probe.
      - Validate AH and OU independently and accrue 100 forward samples per league-market.
    deployment_status: NOT_RUN
    direction_allowed_changes: []
    scheduler_runtime_change: NEED_USER_APPROVAL_STAGING_SCHEDULER_RECONFIGURE_REMOVE_WORLD_CUP
  - id: R1.1-ACCRUAL-CHECKPOINT
    priority: high
    status: ACCUMULATING
    acceptance_gate:
      - At least 100 cards with entry and prematch closing snapshots.
      - Shadow CLV sample count and median are measurable.
      - Closing snapshots are demonstrably being written.
      - Provider usage remains at or below 120 calls per day.
    warning: Local dry-run without staging runtime data must not be interpreted as zero staging accrual.
  - id: DIRECTION-ALLOWED-PREREG
