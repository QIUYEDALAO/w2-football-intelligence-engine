name: w2-football-intelligence-engine

services:
  api:
    profiles: ["local"]
    build:
      context: .
      dockerfile: infra/Dockerfile.python
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000
    env_file: .env.example
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5

  worker:
    profiles: ["local"]
    build:
      context: .
      dockerfile: infra/Dockerfile.python
    command: celery -A apps.worker.celery_app.celery_app worker --loglevel=INFO
    env_file: .env.example
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "from apps.worker.celery_app import ping; assert ping.run() == 'pong'"]
      interval: 20s
      timeout: 5s
      retries: 5

  scheduler:
    profiles: ["local"]
    build:
      context: .
      dockerfile: infra/Dockerfile.python
    command: python -m apps.scheduler.main
    env_file: .env.example
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "from apps.scheduler.main import heartbeat; assert heartbeat()"]
      interval: 20s
      timeout: 5s
      retries: 5

  web:
    profiles: ["local"]
    build:
      context: apps/web
      dockerfile: ../../infra/Dockerfile.web
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5

  postgres:
    profiles: ["local"]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: w2
      POSTGRES_USER: w2_user
      POSTGRES_PASSWORD: placeholder_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U w2_user -d w2"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    profiles: ["local"]
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    profiles: ["local"]
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: placeholder_access_key
      MINIO_ROOT_PASSWORD: placeholder_secret_key
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  minio-data:

