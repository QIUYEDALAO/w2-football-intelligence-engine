log_format w2_timing '$remote_addr method=$request_method uri=$uri status=$status '
                     'request_time=$request_time upstream_connect_time=$upstream_connect_time '
                     'upstream_response_time=$upstream_response_time bytes=$body_bytes_sent '
                     'request_id=$request_id';
access_log /dev/stdout w2_timing;

server {
  listen 8080;
  server_name _;
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $api_upstream http://api:8000;
  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass $api_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /v1/ {
    proxy_pass $api_upstream$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location = /health {
    proxy_pass $api_upstream/health;
    proxy_set_header Host $host;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location = /ready {
    proxy_pass $api_upstream/ready;
    proxy_set_header Host $host;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location = /ops {
    try_files /index.html =404;
  }

  location /ops/ {
    proxy_pass $api_upstream$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = / {
    add_header Cache-Control "no-store";
    try_files /index.html =404;
  }

  location = /index.html {
    add_header Cache-Control "no-store";
    try_files /index.html =404;
  }

  location = /meta.json {
    add_header Cache-Control "no-store";
    try_files /meta.json =404;
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }
}
