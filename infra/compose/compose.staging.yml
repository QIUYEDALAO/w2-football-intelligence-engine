# W2 Staging Compose — standalone (no inheritance from docker-compose.yml)
# All business ports bound to 127.0.0.1 only.
# Usage: sudo docker compose -f infra/compose/compose.staging.yml --env-file /opt/w2/shared/.env -p w2 up -d

name: w2-staging

services:

  postgres:
    image: postgres:16-alpine
    shm_size: 256m
    environment:
      POSTGRES_DB: w2
      POSTGRES_USER: w2_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - w2-staging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U w2_user -d w2"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    networks:
      - w2-staging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"
    expose:
      - "6379"

  migration:
    build:
      context: ../..
      dockerfile: Dockerfile.migrations
    command:
      - "uv"
      - "run"
      - "alembic"
      - "upgrade"
      - "head"
    environment:
      W2_DATABASE_URL: postgresql+psycopg://w2_user:${POSTGRES_PASSWORD}@postgres:5432/w2
      W2_ENVIRONMENT: staging
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - w2-staging
    restart: no
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: ../..
      dockerfile: Dockerfile.api
    command:
      - "uv"
      - "run"
      - "uvicorn"
      - "apps.api.main:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
    ports:
      - "127.0.0.1:18000:8000"
    volumes:
      - ../../runtime:/app/runtime
      - ./config:/app/config
    environment:
      W2_ENVIRONMENT: staging
      W2_DATABASE_URL: postgresql+psycopg://w2_user:${POSTGRES_PASSWORD}@postgres:5432/w2
      W2_REDIS_URL: redis://redis:6379/0
      W2_CELERY_BROKER_URL: redis://redis:6379/1
      W2_CELERY_RESULT_BACKEND: redis://redis:6379/2
      W2_FORWARD_HOLDOUT_AUTORUN: "true"
      W2_FORWARD_HOLDOUT_NETWORK: "true"
      W2_DEEPSEEK_ENABLED: "false"
      W2_RECOMMENDATION_ENABLED: "false"
      W2_CANDIDATE_ENABLED: "false"
      W2_PRODUCTION_RELEASE: "false"
      W2_EXTERNAL_ALERTING: "false"
      W2_API_DAILY_HARD_LIMIT: "6000"
      W2_API_MINIMUM_RESERVE: "1500"
      CELERY_WORKER_CONCURRENCY: "1"
      W2_SERVICE_VERSION: staging-0.1.0
      W2_API_FOOTBALL_API_KEY: ${W2_API_FOOTBALL_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5); assert r.status==200"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - w2-staging
    restart: unless-stopped
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"

  worker:
    build:
      context: ../..
      dockerfile: Dockerfile.worker
    command:
      - "uv"
      - "run"
      - "celery"
      - "-A"
      - "apps.worker.celery_app"
      - "worker"
      - "--loglevel=INFO"
      - "--concurrency=1"
    volumes:
      - ../../runtime:/app/runtime
      - ./config:/app/config
      - ../../config/policies:/app/config/policies:ro
    environment:
      W2_ENVIRONMENT: staging
      W2_DATABASE_URL: postgresql+psycopg://w2_user:${POSTGRES_PASSWORD}@postgres:5432/w2
      W2_REDIS_URL: redis://redis:6379/0
      W2_CELERY_BROKER_URL: redis://redis:6379/1
      W2_CELERY_RESULT_BACKEND: redis://redis:6379/2
      W2_FORWARD_HOLDOUT_AUTORUN: "true"
      W2_FORWARD_HOLDOUT_NETWORK: "true"
      W2_DEEPSEEK_ENABLED: "false"
      W2_RECOMMENDATION_ENABLED: "false"
      W2_CANDIDATE_ENABLED: "false"
      W2_PRODUCTION_RELEASE: "false"
      W2_EXTERNAL_ALERTING: "false"
      W2_API_DAILY_HARD_LIMIT: "6000"
      W2_API_MINIMUM_RESERVE: "1500"
      CELERY_WORKER_CONCURRENCY: "1"
      W2_SERVICE_VERSION: staging-0.1.0
      W2_API_FOOTBALL_API_KEY: ${W2_API_FOOTBALL_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import os; from apps.worker.celery_app import ping; assert ping.run() == 'pong'; assert os.path.isdir('/app/runtime'); assert os.access('/app/runtime', os.W_OK)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - w2-staging
    restart: unless-stopped
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"

  scheduler:
    build:
      context: ../..
      dockerfile: Dockerfile.scheduler
    command:
      - "uv"
      - "run"
      - "python"
      - "-m"
      - "apps.scheduler.main"
    volumes:
      - ../../runtime:/app/runtime
      - ./config:/app/config
      - ../../config/policies:/app/config/policies:ro
    environment:
      W2_ENVIRONMENT: staging
      W2_DATABASE_URL: postgresql+psycopg://w2_user:${POSTGRES_PASSWORD}@postgres:5432/w2
      W2_REDIS_URL: redis://redis:6379/0
      W2_CELERY_BROKER_URL: redis://redis:6379/1
      W2_CELERY_RESULT_BACKEND: redis://redis:6379/2
      W2_FORWARD_HOLDOUT_AUTORUN: "true"
      W2_FORWARD_HOLDOUT_NETWORK: "true"
      W2_FUTURE_FIXTURE_REFRESH_ENABLED: "true"
      W2_FUTURE_FIXTURE_REFRESH_COMPETITION_ID: "world_cup_2026"
      W2_DEEPSEEK_ENABLED: "false"
      W2_RECOMMENDATION_ENABLED: "false"
      W2_CANDIDATE_ENABLED: "false"
      W2_PRODUCTION_RELEASE: "false"
      W2_EXTERNAL_ALERTING: "false"
      W2_API_DAILY_HARD_LIMIT: "6000"
      W2_API_MINIMUM_RESERVE: "1500"
      CELERY_WORKER_CONCURRENCY: "1"
      W2_SERVICE_VERSION: staging-0.1.0
      W2_API_FOOTBALL_API_KEY: ${W2_API_FOOTBALL_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "from apps.scheduler.main import heartbeat, future_fixture_refresh_contract_ready; assert 'heartbeat' in heartbeat(); assert future_fixture_refresh_contract_ready()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - w2-staging
    restart: unless-stopped
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"

  web:
    build:
      context: ../..
      dockerfile: Dockerfile.web
    ports:
      - "127.0.0.1:18080:8080"
    environment:
      W2_ENVIRONMENT: staging
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - w2-staging
    restart: unless-stopped
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"

networks:
  w2-staging:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
