name: W2 Staging Edge Latency Observer

on:
  workflow_dispatch:
    inputs:
      requests:
        description: Sanitized samples per endpoint
        required: false
        default: "20"

permissions:
  contents: read

jobs:
  direct-ipv4:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Measure direct public IPv4 path
        env:
          SAMPLE_COUNT: ${{ inputs.requests }}
        run: |
          set -euo pipefail
          mkdir -p edge-latency
          base='http://43.155.208.138/v1/dashboard/day-view?date=2026-07-16&timezone=Asia%2FShanghai&page_size=20'
          common_args=(
            --expected-remote-ip 43.155.208.138
            --path-kind DIRECT
            --observer-id github-hosted
            --observer-environment GITHUB_HOSTED
            --network-provider GITHUB_ACTIONS
            --ip-protocol IPv4
          )
          declare -A urls=(
            [today]="$base&window=today"
            [next36]="$base&window=next36"
            [future-page1]="$base&window=future"
          )
          page1=$(curl --noproxy '*' --fail --silent --show-error "${urls[future-page1]}")
          cursor=$(python -c 'import json,sys; print(json.load(sys.stdin)["pagination"]["next_cursor"])' <<<"$page1")
          encoded_cursor=$(python -c 'import sys,urllib.parse; print(urllib.parse.quote(sys.stdin.read().strip(), safe=""))' <<<"$cursor")
          urls[future-page2]="${urls[future-page1]}&cursor=$encoded_cursor"
          unset page1 cursor encoded_cursor

          for name in today next36 future-page1 future-page2; do
            python scripts/check_w2_public_edge_latency.py \
              --url "${urls[$name]}" "${common_args[@]}" \
              --connection-mode REUSED --requests "$SAMPLE_COUNT" \
              --output "edge-latency/$name-warm-reused.json" >/dev/null
            python scripts/check_w2_public_edge_latency.py \
              --url "${urls[$name]}" "${common_args[@]}" \
              --connection-mode FRESH --requests 10 \
              --output "edge-latency/$name-cold-fresh.json" >/dev/null
            for concurrency in 1 2 4 8; do
              python scripts/check_w2_public_edge_latency.py \
                --url "${urls[$name]}" "${common_args[@]}" \
                --connection-mode FRESH --requests 8 --concurrency "$concurrency" \
                --output "edge-latency/$name-c$concurrency.json" >/dev/null
            done
          done
      - uses: actions/upload-artifact@v4
        with:
          name: staging-edge-latency-direct-ipv4
          path: edge-latency
          if-no-files-found: error
          retention-days: 7
