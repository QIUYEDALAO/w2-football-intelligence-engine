name: W2 Stage 2 CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: w2
          POSTGRES_USER: w2_user
          POSTGRES_PASSWORD: placeholder_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U w2_user -d w2"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      W2_ENVIRONMENT: test
      W2_DATABASE_URL: postgresql+psycopg://w2_user:placeholder_password@127.0.0.1:5432/w2
      W2_TEST_POSTGRES_URL: postgresql+psycopg://w2_user:placeholder_password@127.0.0.1:5432/w2
      W2_REDIS_URL: redis://127.0.0.1:6379/0
      W2_CELERY_BROKER_URL: redis://127.0.0.1:6379/1
      W2_CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/2
      W2_PROVIDER_CALLS_DISABLED: "true"
      W2_PROVIDER_SCHEDULER_ENABLED: "false"
      W2_PROVIDER_REFRESH_MIN_INTERVAL_SECONDS: "900"
      W2_PROVIDER_ENDPOINT_ALLOWLIST: "status,fixtures,odds,lineups"
      W2_PROVIDER_REFRESH_TICK_HARD_CAP: "30"
      W2_XG_BACKFILL_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install Python 3.12 dependencies
        run: uv sync --python 3.12 --all-groups --frozen
      - name: Stage 1 contract checker
        run: uv run --python 3.12 python scripts/check_w2_stage1_contracts.py
      - name: Tracked output guard
        run: uv run --python 3.12 python scripts/check_tracked_outputs.py
      - name: All-stage checker
        run: uv run --python 3.12 python scripts/check_w2_all.py
      - name: Ruff
        run: uv run --python 3.12 ruff check .
      - name: Mypy
        run: uv run --python 3.12 mypy src apps
      - name: Pytest
        run: uv run --python 3.12 pytest -q
      - name: Alembic smoke
        run: |
          uv run --python 3.12 alembic upgrade head
          uv run --python 3.12 alembic downgrade 0028_create_matchday_evidence_authority
          uv run --python 3.12 alembic upgrade head
          uv run --python 3.12 alembic downgrade 0027_finalize_fah_authority_constraints
          uv run --python 3.12 alembic upgrade head
      - name: Docker Compose config
        run: docker compose config
      - name: Secret pattern scan
        run: uv run --python 3.12 python tests/secret_scan.py
  staging-parity:
    runs-on: ubuntu-latest
    env:
      W2_ENVIRONMENT: test
      W2_PROVIDER_CALLS_DISABLED: "true"
      W2_PROVIDER_SCHEDULER_ENABLED: "false"
      W2_PROVIDER_REFRESH_MIN_INTERVAL_SECONDS: "900"
      W2_PROVIDER_ENDPOINT_ALLOWLIST: "status,fixtures,odds,lineups"
      W2_PROVIDER_REFRESH_TICK_HARD_CAP: "30"
      W2_XG_BACKFILL_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install Python 3.12 dependencies
        run: uv sync --python 3.12 --all-groups --frozen
      - name: Future refresh staging parity
        run: |
          uv run --python 3.12 pytest -q \
            tests/integration/test_future_refresh_staging_parity.py \
            tests/integration/test_future_refresh_e2e_smoke.py
      - name: Future refresh staging contract
        run: uv run --python 3.12 python scripts/check_w2_future_refresh_staging_contract.py
      - name: Secret pattern scan
        run: uv run --python 3.12 python tests/secret_scan.py
  predeploy-e2e:
    runs-on: ubuntu-latest
    env:
      W2_ENVIRONMENT: test
      W2_PROVIDER_CALLS_DISABLED: "true"
      W2_PROVIDER_SCHEDULER_ENABLED: "false"
      W2_PROVIDER_REFRESH_MIN_INTERVAL_SECONDS: "900"
      W2_PROVIDER_ENDPOINT_ALLOWLIST: "status,fixtures,odds,lineups"
      W2_PROVIDER_REFRESH_TICK_HARD_CAP: "30"
      W2_XG_BACKFILL_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install Python 3.12 dependencies
        run: uv sync --python 3.12 --all-groups --frozen
      - name: Predeploy e2e staging smoke
        run: bash scripts/run_predeploy_e2e_smoke.sh
      - name: Predeploy e2e regression contracts
        run: |
          uv run --python 3.12 pytest -q \
            tests/contract/test_predeploy_e2e_regressions.py \
            tests/unit/test_analysis_card_api.py::test_read_model_repository_merges_dashboard_and_db_fixtures \
            tests/unit/test_analysis_card_api.py::test_analysis_card_falls_back_for_db_fixture_when_dashboard_exists
      - name: Secret pattern scan
        run: uv run --python 3.12 python tests/secret_scan.py
