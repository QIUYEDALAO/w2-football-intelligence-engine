name: W2 Stage 2 CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: w2
          POSTGRES_USER: w2_user
          POSTGRES_PASSWORD: placeholder_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U w2_user -d w2"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      W2_ENVIRONMENT: test
      W2_DATABASE_URL: postgresql+psycopg://w2_user:placeholder_password@127.0.0.1:5432/w2
      W2_REDIS_URL: redis://127.0.0.1:6379/0
      W2_CELERY_BROKER_URL: redis://127.0.0.1:6379/1
      W2_CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/2
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install Python 3.12 dependencies
        run: uv sync --python 3.12 --all-groups --frozen
      - name: Stage 1 contract checker
        run: uv run --python 3.12 python scripts/check_w2_stage1_contracts.py
      - name: Ruff
        run: uv run --python 3.12 ruff check .
      - name: Mypy
        run: uv run --python 3.12 mypy src apps
      - name: Pytest
        run: uv run --python 3.12 pytest -q
      - name: Alembic smoke
        run: |
          uv run --python 3.12 alembic upgrade head
          uv run --python 3.12 alembic downgrade base
          uv run --python 3.12 alembic upgrade head
      - name: Docker Compose config
        run: docker compose config
      - name: Secret pattern scan
        run: uv run --python 3.12 python tests/secret_scan.py

  gate3-baselight-v3:
    if: >-
      github.event_name == 'pull_request' &&
      github.head_ref == 'chore/gate3-baselight-v3-resume-500' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      BASELIGHT_API_KEY: ${{ secrets.BASELIGHT_API_KEY }}
      W2_GATE3_RUN_DIR: ${{ runner.temp }}/w2_gate3_baselight_v3
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install Python 3.12 dependencies
        run: uv sync --python 3.12 --all-groups --frozen
      - name: Restore external sample checkpoint
        uses: actions/cache@v4
        with:
          path: ${{ env.W2_GATE3_RUN_DIR }}
          key: gate3-baselight-v3-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            gate3-baselight-v3-
      - name: Validate resume contract
        run: >-
          uv run --python 3.12 pytest -q
          tests/contract/test_gate3_baselight_odds_window_v3_resume.py
      - name: Run bounded extraction and limited walk-forward
        id: gate3
        shell: bash
        run: |
          set +e
          mkdir -p "$W2_GATE3_RUN_DIR/reports"
          uv run --python 3.12 python \
            scripts/run_w2_gate3_baselight_odds_window_v3_resume.py \
            --live \
            --resume \
            --output "$W2_GATE3_RUN_DIR/baselight_limited_ah.jsonl" \
            --state-file "$W2_GATE3_RUN_DIR/extract_state.json" \
            --reports-dir "$W2_GATE3_RUN_DIR/reports" \
            --target-fixtures 500 \
            --max-rows 250000 \
            --query-limit 5000 \
            --rows-per-bookmaker 2 \
            --metadata-batch-size 100 \
            --date-window-days 7 \
            --max-date-windows 120 \
            --per-query-timeout-seconds 180
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Emit sanitized aggregate evidence
        if: always()
        shell: bash
        run: |
          for path in \
            "$W2_GATE3_RUN_DIR/reports/W2_GATE3_BASELIGHT_ODDS_DATE_WINDOW_V3_RUN.json" \
            "$W2_GATE3_RUN_DIR/reports/W2_GATE3_BASELIGHT_LIMITED_AH_EXTRACT_MANIFEST.json" \
            "$W2_GATE3_RUN_DIR/reports/W2_GATE3_BASELIGHT_AH_WALK_FORWARD.json" \
            "$W2_GATE3_RUN_DIR/reports/W2_GATE3_BASELIGHT_AH_WALK_FORWARD_RESULT.md"
          do
            if [[ -f "$path" ]]; then
              echo "===== BEGIN $(basename "$path") ====="
              cat "$path"
              echo "===== END $(basename "$path") ====="
            fi
          done
      - name: Upload aggregate reports only
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate3-baselight-v3-aggregate-reports
          path: ${{ env.W2_GATE3_RUN_DIR }}/reports
          if-no-files-found: warn
          retention-days: 1
      - name: Enforce target
        if: always()
        shell: bash
        run: |
          exit_code="${{ steps.gate3.outputs.exit_code }}"
          if [[ -z "$exit_code" ]]; then
            echo "GATE3_BASELIGHT_RUN_DID_NOT_START"
            exit 1
          fi
          if [[ "$exit_code" != "0" ]]; then
            echo "GATE3_BASELIGHT_TARGET_NOT_REACHED exit_code=$exit_code"
            exit "$exit_code"
          fi
